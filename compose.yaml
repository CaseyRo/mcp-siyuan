services:
  mcp-siyuan:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - TRANSPORT=http
      - HOST=0.0.0.0
      - SIYUAN_URL=http://siyuan:6806
      - SIYUAN_TOKEN=${SIYUAN_TOKEN:-}
    networks:
      - siyuan_default

networks:
  siyuan_default:
    external: true
