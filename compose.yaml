services:
  mcp-siyuan:
    build: .
    restart: unless-stopped
    ports:
      - "8006:8000"
    environment:
      - TRANSPORT=http
      - HOST=0.0.0.0
      - SIYUAN_URL=http://siyuan:6806
      - SIYUAN_TOKEN=${SIYUAN_TOKEN:-}
      - MCP_API_KEY=${MCP_API_KEY:-}
      - FASTMCP_HOME=/data/fastmcp
    deploy:
      resources:
        limits:
          memory: 512m
    volumes:
      - fastmcp-data:/data/fastmcp
    networks:
      - siyuan_default

volumes:
  fastmcp-data:

networks:
  siyuan_default:
    external: true
