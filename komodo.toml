[[stack]]
name = "git-mcp-siyuan"
description = "MCP server for SiYuan Notes (FastMCP 3.x)"
deploy = true
tags = ["mcp"]

[stack.config]
server_id = "ubuntu-smurf-mirror"
git_provider = "github.com"
git_account = "CaseyRo"
repo = "CaseyRo/mcp-siyuan"
branch = "main"
environment = """
SIYUAN_TOKEN = [[SIYUAN_TOKEN]]
MCP_SIYUAN_API_KEY = [[MCP_SIYUAN_API_KEY]]
MCP_SIYUAN_PUBLIC_URL = https://mcp-siyuan.cdit-dev.de
KEYCLOAK_ISSUER = https://auth.cdit-works.de/realms/cdit-mcp
KEYCLOAK_AUDIENCE = mcp-siyuan
"""
