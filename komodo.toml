# Live host is nebula-1 (ubuntu-smurf-mirror decommissioned 2026-06-10). See ARCHITECTURE.md.
[[server]]
name = "nebula-1"
[server.config]
address = "http://100.89.96.56:8120"
enabled = true

# Live Komodo stack is named `git-mcp-siyuan-nebula` — this stanza name matches it.
[[stack]]
name = "git-mcp-siyuan-nebula"
description = "MCP server for SiYuan Notes (FastMCP 3.x)"
deploy = true
tags = ["mcp"]

[stack.config]
server_id = "nebula-1"
git_provider = "github.com"
repo = "CaseyRo/mcp-siyuan"
branch = "main"
environment = """
SIYUAN_TOKEN = [[SIYUAN_TOKEN]]
MCP_API_KEY = [[MCP_SIYUAN_API_KEY]]
"""
